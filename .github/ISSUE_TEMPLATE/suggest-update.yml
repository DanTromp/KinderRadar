name: Suggest update
description: Update or correct an existing activity (price, time, age, contact, etc.).
title: "[Update] Existing activity"
labels: ["data", "type:update"]
body:
  - type: input
    id: slug
    attributes:
      label: Activity slug
      description: Found in the URL, e.g. /activities/rookie-swim-start/.
      placeholder: rookie-swim-start
  - type: input
    id: activity
    attributes:
      label: Activity name
    validations:
      required: true
  - type: input
    id: town
    attributes:
      label: Town
  - type: dropdown
    id: change-type
    attributes:
      label: What changed?
      options:
        - Price / cost
        - Time / day
        - Age range
        - Contact details / URL
        - Description / other
    validations:
      required: true
  - type: textarea
    id: new-value
    attributes:
      label: New value
      placeholder: e.g. New time is Tuesday 17:00, cost is now €18/month.
    validations:
      required: true
  - type: input
    id: evidence-url
    attributes:
      label: Evidence URL
      description: Link to the organizer page (or screenshot/Drive link) supporting the change.
      placeholder: https://...
  - type: dropdown
    id: verified-by
    attributes:
      label: How do you know?
      options:
        - I'm the organizer
        - I'm a parent who attended recently
        - I saw it on the organizer's website
        - Other
    validations:
      required: true
